<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RKD Radio</title>
  
<link rel="stylesheet" href="style.css" /></head>

<body>
  <header>
    <h1>📡 WaveScan</h1>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="loc-status" style="font-size:0.75rem;color:var(--text-muted)">...</span>
      <div class="theme-radios">
        <input type="radio" name="theme" id="t-default" value="default" checked="" />
        <label for="t-default">☀️</label>
        <input type="radio" name="theme" id="t-dark" value="dark" />
        <label for="t-dark">🌑</label>
        <input type="radio" name="theme" id="t-neon" value="neon" />
        <label for="t-neon">🎆</label>
      </div>
      <button class="min-btn" id="minimize-btn">➖ Min</button>
      <button class="btn" id="scan-btn" style="padding:4px 8px; font-size:0.8rem;">🔍 Scan</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab" data-tab="local">📍 Local FM</button>
    <button class="tab active" data-tab="india">🇮🇳 Indian FM</button>
    <button class="tab" data-tab="world">🌍 World Popular</button>
  </div>

  <div class="genre-bar" id="genre-bar">
    <button class="chip active" data-genre="all">All</button>
    <button class="chip" data-genre="hindi">Hindi</button>
    <button class="chip" data-genre="bhakti">Bhakti</button>
    <button class="chip" data-genre="news">News</button>
    <button class="chip" data-genre="bangla">Bangla</button>    
    <button class="chip" data-genre="music">Music</button>
    <button class="chip" data-genre="bollywood">Bollywood</button>
    <button class="chip" data-genre="remix">Remix/DJ</button>
    <button class="chip" data-genre="classic">Classic</button>
    

  </div>

  <main>
    <!-- 1. Now Playing -->
    <div class="now-playing">
      <div class="dance-container" id="dance-container"></div>
      <div class="digital-display" id="digital-display">
        <div class="digi-freq" id="digi-freq">--.-</div>
        <div class="digi-meta" id="digi-meta">OFF AIR</div>
      </div>
      <div class="np-header">
        <span id="signal-led" class="led red"></span>
        <h1 id="np-title">No Station Selected</h1>
      </div>
      <p id="np-meta">Select a station to start listening</p>
      <canvas id="visualizer"></canvas>
    </div>

    <!-- 2. Playback Controls -->
    <div class="controls">
      <div class="playback-btns">
        <div class="loudspeaker-mini" id="mini-speaker-l">
          <div class="speaker-cone-mini"></div>
          <div class="speaker-cap-mini"></div>
        </div>
        <div class="btn-group">
          <button class="ctrl-btn" id="prev-btn">⏮</button>
          <button class="ctrl-btn play" id="play-btn">▶</button>
          <button class="ctrl-btn" id="next-btn">⏭</button>
        </div>
        <div class="loudspeaker-mini" id="mini-speaker-r">
          <div class="speaker-cone-mini"></div>
          <div class="speaker-cap-mini"></div>
        </div>
      </div>
      <div class="vol-wrap">
        <button class="ctrl-btn" id="mute-btn">🔊</button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.7" />
      </div>
    </div>

    <!-- 3. Audio FX Panel -->
    <div class="fx-panel">
      <div class="fx-group">
        <label>🔊 Bass Boost</label>
        <input type="range" id="fx-bass" min="-10" max="10" step="0.5" value="0" />
      </div>
      <div class="fx-group">
        <label>🎵 Treble</label>
        <input type="range" id="fx-treble" min="-10" max="10" step="0.5" value="0" />
      </div>
      <div class="fx-group">
        <label>🎧 Stereo Width</label>
        <input type="range" id="fx-stereo" min="-1" max="1" step="0.1" value="0" />
      </div>
      <div class="fx-group">
        <button class="fx-toggle" id="fx-dj">
          🎛️ DJ Mode: <span id="dj-state">OFF</span>
        </button>
      </div>
    </div>

    <!-- 4. Station List (MOVED HERE) -->
    <h2 class="section-title">📻 Available Stations</h2>
    <div class="station-grid" id="station-list">Loading stations...</div>

    <div class="status" id="status-msg">Ready</div>
    <button class="btn" id="maximize-btn">🔳</button>
  </main>

  <audio id="audio-player" crossorigin="anonymous"></audio>

  


<script src="script.js"></script></body></html>
