<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> RKD Radio</title>
  
<link rel="stylesheet" href="style.css" /></head>

<body>

  <header>
    <h1 id="ve-18" style="font-size: 24px; font-family: Inter, sans-serif; font-weight: bold; font-style: normal; text-decoration: none; opacity: 1; border-radius: 0px; margin: 0px; color: transparent; -webkit-text-fill-color: transparent; background-color: transparent; background-image: linear-gradient(to right, rgb(234, 143, 16), rgb(0, 245, 241)); background-clip: text; text-shadow: rgb(0, 0, 0) 0px 0px 18px; filter: contrast(200%) brightness(165%) hue-rotate(336deg) blur(0px);">
      『 RKD 』 ᴵⁿᵗᵉʳⁿᵉᵗ ᴿᵃᵈⁱᵒ</h1>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="loc-status" style="font-size:0.75rem;color:var(--text-muted)">.</span>
      <div style="display:inline-flex; align-items:center; gap:5px; margin-left:10px;">
        <label for="api-limit" style="font-size:0.7rem; color:var(--text-muted);">Stations:</label>
        <input type="number" id="api-limit" value="40" min="10" max="300" step="10" style="width:50px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:2px; font-size:0.8rem;" />
      </div>
      <button class="btn theme-cycle-btn" id="theme-cycle-btn" style="padding:2px 8px; font-size:1.2rem; background:var(--surface-secondary); color:var(--text); border:1px solid var(--border); border-radius: 20px;" title="Toggle Theme"> 📟</button>


      <button class="btn" id="local-device-btn" style="padding:4px 8px; font-size:1.0rem; background:#3c3d36"><svg height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
          <path d="M560-320h80v-80h80v-80h-80v-80h-80v80h-80v80h80v80ZM160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h240l80 80h320q33 0 56.5 23.5T880-640v400q0 33-23.5 56.5T800-160H160Zm0-80h640v-400H447l-80-80H160v480Zm0 0v-480 480Z"/>
        </svg></button>
      <button class="btn" id="scan-btn" style="padding:4px 12px; font-size:0.9rem; font-weight:bold; background:var(--accent); color:#000;">SCAN</button>
      <input type="file" id="local-device-input" accept="audio/*" multiple="" style="display:none" />
    </div>
  </header>
  <main>
    <!-- 1. Now Playing -->
    <div class="now-playing">
      <div class="np-layout-wrapper">
        <div class="dance-container" id="dance-container"></div>
        <div id="np-logo-wrapper" class="np-logo-wrapper" style="position: relative;">
          <div id="np-country" style="position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.65rem; text-align: center; padding: 2px 0; z-index: 10; display: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
          </div>
          <img id="np-logo" style="display:none;" onerror="this.style.display='none'; document.getElementById('np-logo-fallback').style.display='block';" />
          <i id="np-logo-fallback">📻</i>
        </div>
        <div class="np-info-wrapper">
          <canvas id="visualizer"></canvas>
        </div>
        <div class="np-header">
          <span id="signal-led" class="led red"></span>
          <h1 id="np-title">Please Station Selected</h1>
        </div>
      </div>
    </div>

    <!-- Station Ticker -->
    <div id="station-ticker" style="margin-top: -16px; margin-bottom: 16px; border-radius: 8px;">
      <span id="ticker-badge" class="ticker-badge prev">⏮ PREV</span>
      <span id="ticker-label" class="prev-color">—</span>
    </div>

    <!-- 2. Playback Controls -->
    <div class="controls">
      <div class="playback-btns">
        <button class="ctrl-btn" id="prev-btn">⏮</button>
        <button class="ctrl-btn play" id="play-btn">▶</button>
        <button class="ctrl-btn" id="next-btn">⏭</button>
      </div>
      <div class="vol-wrap">
        <button class="ctrl-btn" id="mute-btn">🔊</button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.7" />
        <label class="boost-wrap" title="Boost Volume">
          <input type="checkbox" id="boost-check" />
          <span class="boost-btn">
            <span class="boost-led"></span>
            BOOST
          </span>
        </label>
      </div>
      <div class="progress-wrap" id="progress-wrap" style="display: none; width: 100%; align-items: center; gap: 10px; margin-top: 5px;">
        <span id="time-current" style="font-size:0.8rem; font-family: monospace;">0:00</span>
        <input type="range" id="progress-slider" min="0" max="100" value="0" style="flex:1; cursor:pointer; height:6px;" />
        <span id="time-total" style="font-size:0.8rem; font-family: monospace;">0:00</span>
      </div>
      <div class="ctrl-toggle-row">
        <button id="region-toggle-btn" class="ctrl-btn toggle-btn" style="border:1px solid transparent; color:var(--success);">🇮🇳 Indian FM</button>
        <button id="audio-mode-btn" class="ctrl-btn toggle-btn" style="border:1px solid #888; color:var(--accent);">🎚️
          Normal</button>
      </div>
    </div>
    <!-- 3. Audio FX Panel -->
    <div class="fx-panel">
      <!-- Sliders (Main View Only) -->
      <div class="fx-group main-only">
        <label>🔊 Bass Boost</label>
        <input type="range" id="fx-bass" min="-10" max="10" step="0.5" value="0" />
      </div>
      <div class="fx-group main-only">
        <label>🎵 Treble</label>
        <input type="range" id="fx-treble" min="-10" max="10" step="0.5" value="0" />
      </div>
    </div>

    <!-- Genre Row (Minimized Mode Only) -->
    <div class="min-only genre-row-min" id="genre-row-min">
    </div>
    <!-- 4. Station List -->
    <h2 class="section-title">Hide List</h2>
    <div class="genre-bar" id="genre-bar">
    </div>
    <!-- Dynamic genres -->

    <div class="station-grid" id="station-list">Loading ...</div>

    <div class="status" id="status-msg">Ready</div>
  </main>

  <audio id="audio-player" crossorigin="anonymous"></audio>

  


<script src="script.js"></script></body></html>
